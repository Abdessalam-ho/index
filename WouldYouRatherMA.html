<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Would You Rather M 🤍 A</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
        body {
            font-family: 'Inter', sans-serif; background: #0a0e27; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px; overflow-x: hidden;
        }
        #sky {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: linear-gradient(180deg, rgba(10,14,39,0.65) 0%, rgba(26,16,64,0.65) 40%, rgba(45,27,105,0.65) 70%, rgba(26,16,64,0.65) 100%), url('bg.jpg') center/cover no-repeat;
            overflow: hidden;
        }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.15; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.3); } }
        .shooting-star {
            position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.5); animation: shoot 3.5s linear infinite; opacity: 0;
        }
        .shooting-star::after {
            content: ''; position: absolute; top: 50%; transform: translateY(-50%);
            width: 70px; height: 1px; background: linear-gradient(to left, rgba(255,255,255,0.4), transparent); right: 3px;
        }
        @keyframes shoot {
            0% { transform: translate(0,0) rotate(-35deg); opacity: 0; }
            5% { opacity: 1; } 18% { transform: translate(-350px, 230px) rotate(-35deg); opacity: 1; }
            22% { opacity: 0; } 100% { opacity: 0; }
        }
        .moon-container { position: absolute; top: 6%; right: 8%; z-index: 1; }
        .moon {
            width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #fffbe6 0%, #f5e6a3 40%, #d4b86a 100%);
            box-shadow: 0 0 50px rgba(245,230,163,0.25), 0 0 100px rgba(245,230,163,0.1), 0 0 200px rgba(245,230,163,0.05);
            position: relative;
        }
        .moon-crater { position: absolute; border-radius: 50%; background: rgba(160,130,60,0.2); }
        .moon-crater:nth-child(1) { width: 24px; height: 24px; top: 22%; left: 18%; }
        .moon-crater:nth-child(2) { width: 14px; height: 14px; top: 58%; left: 52%; }
        .moon-crater:nth-child(3) { width: 20px; height: 20px; top: 12%; left: 62%; }
        .moon-crater:nth-child(4) { width: 10px; height: 10px; top: 72%; left: 22%; }
        .moon-crater:nth-child(5) { width: 13px; height: 13px; top: 42%; left: 72%; }
        .moon-glow {
            position: absolute; top: -40px; left: -40px; width: 210px; height: 210px; border-radius: 50%;
            background: radial-gradient(circle, rgba(245,230,163,0.06) 0%, transparent 65%);
            animation: moonPulse 4s ease-in-out infinite alternate;
        }
        @keyframes moonPulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; } }

        .orbit-container {
            position: absolute; top: -45px; left: -45px;
            width: 220px; height: 220px;
            animation: orbit 7s linear infinite; z-index: 10;
        }
        @keyframes orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .orbiting-star {
            position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
        }
        .orbiting-star::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 40% 30%, #fff 0%, #fffbe6 40%, #f5e6a3 100%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 0 25px rgba(245,230,163,0.5), 0 0 50px rgba(245,230,163,0.2);
            animation: starPulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes starPulse {
            0% { box-shadow: 0 0 25px rgba(245,230,163,0.5); }
            100% { box-shadow: 0 0 50px rgba(245,230,163,0.8), 0 0 80px rgba(245,230,163,0.3); }
        }
        .orbiting-star .star-text {
            position: relative; z-index: 2;
            font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 800;
            color: #fff; text-shadow: 0 0 12px rgba(0,0,0,0.7), 0 0 4px rgba(0,0,0,0.5);
            letter-spacing: 1px; margin-top: 4px;
        }
        .container {
            position: relative; z-index: 10; max-width: 600px; width: 100%;
            background: rgba(255,255,255,0.07); backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
            padding: 45px 38px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 {
            font-family: 'Playfair Display', serif; font-size: 2.8em;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f5e6a3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 2px; letter-spacing: 6px;
        }
        .header p { color: rgba(255,255,255,0.35); font-size: 0.85em; font-weight: 300; letter-spacing: 2px; }
        .initials {
            text-align: center; font-family: 'Playfair Display', serif;
            font-size: 1em; color: rgba(255,255,255,0.15); letter-spacing: 8px;
            margin-bottom: 20px;
        }
        .question-area { text-align: center; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        .question-number {
            font-size: 0.7em; color: rgba(233,30,99,0.5); letter-spacing: 2px;
            margin-bottom: 12px; text-transform: uppercase;
        }
        .question-text {
            font-family: 'Playfair Display', serif; font-size: 1.5em;
            color: rgba(255,255,255,0.92); margin-bottom: 25px;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative; }
        .option-btn {
            padding: 18px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
            font-family: 'Inter', sans-serif; font-size: 0.9em; cursor: pointer;
            transition: all 0.3s; min-height: 70px;
            display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4;
        }
        .option-btn:hover { background: rgba(233,30,99,0.12); border-color: rgba(233,30,99,0.3); transform: translateY(-2px); }
        .option-btn.selected { background: rgba(233,30,99,0.15); border-color: #e91e63; color: #f8bbd0; box-shadow: 0 0 20px rgba(233,30,99,0.15); }
        .option-btn:disabled { cursor: default; transform: none; opacity: 0.7; }
        .option-btn:disabled:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); }
        .option-btn:disabled.selected { background: rgba(233,30,99,0.15); border-color: #e91e63; opacity: 1; }
        .vs { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 0.8em; color: rgba(255,255,255,0.15); pointer-events: none; }
        .reveal-box {
            margin-top: 14px; padding: 12px 18px; border-radius: 14px; min-height: 44px;
            display: flex; align-items: center; justify-content: center; font-size: 0.9em;
            animation: fadeIn 0.4s ease-out;
        }
        .reveal-box.match { background: rgba(129,199,132,0.06); border: 1px solid rgba(129,199,132,0.2); color: #a5d6a7; }
        .reveal-box.mismatch { background: rgba(239,83,80,0.06); border: 1px solid rgba(239,83,80,0.2); color: #ef9a9a; }
        .btn-next {
            padding: 10px 32px; border: none; border-radius: 30px;
            background: linear-gradient(135deg, #e91e63, #c2185b); color: #fff;
            font-family: 'Playfair Display', serif; font-size: 0.95em; font-weight: 600;
            cursor: pointer; transition: all 0.3s; margin: 16px auto 0; display: inline-block;
        }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233,30,99,0.3); }
        .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .progress-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 22px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.3s; }
        .dot.active { background: #e91e63; box-shadow: 0 0 10px rgba(233,30,99,0.4); }
        .dot.done { background: rgba(233,30,99,0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .hidden { display: none; }
        .results { text-align: center; }
        .results h2 {
            font-family: 'Playfair Display', serif; font-size: 2em;
            background: linear-gradient(135deg, #fce4ec, #f5e6a3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 4px;
        }
        .results .subtitle { color: rgba(255,255,255,0.4); font-size: 0.9em; margin-bottom: 8px; }
        .score-circle {
            width: 140px; height: 140px; border-radius: 50%;
            border: 2px solid rgba(245,230,163,0.2);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; margin: 16px auto;
            background: rgba(245,230,163,0.03);
        }
        .score-number {
            font-family: 'Playfair Display', serif; font-size: 2.8em;
            background: linear-gradient(135deg, #fce4ec, #f5e6a3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1;
        }
        .score-label { font-size: 0.8em; color: rgba(255,255,255,0.35); margin-top: 4px; }
        .result-item {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
            text-align: left; animation: fadeIn 0.3s ease-out;
        }
        .result-item .r-q { font-size: 0.8em; color: #f8bbd0; margin-bottom: 3px; }
        .result-item .r-answers { font-size: 0.85em; color: rgba(255,255,255,0.65); }
        .result-item .r-answers .hers { color: #f8bbd0; }
        .result-item .r-answers .his { color: #f5e6a3; }
        .btn-restart {
            display: inline-block; padding: 8px 24px; background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 30px; font-size: 0.85em; cursor: pointer;
            transition: all 0.3s; margin-top: 16px;
        }
        .btn-restart:hover { background: rgba(255,255,255,0.12); color: #fff; }
        @media (max-width: 600px) {
            .container { padding: 22px 16px; }
            .header h1 { font-size: 2em; }
            .question-text { font-size: 1.2em; }
            .options { grid-template-columns: 1fr; gap: 10px; }
            .vs { display: none; }
            .moon { width: 85px; height: 85px; }
            .moon-container { top: 3%; right: 5%; }
            .moon-glow { width: 140px; height: 140px; top: -28px; left: -28px; }
        }
    </style>
</head>
<body>

<div id="sky"></div>

<div class="moon-container">
    <div class="moon">
        <div class="moon-crater"></div>
        <div class="moon-crater"></div>
        <div class="moon-crater"></div>
        <div class="moon-crater"></div>
        <div class="moon-crater"></div>
        <div class="moon-glow"></div>
    </div>
    <div class="orbit-container">
        <div class="orbiting-star">
            <span class="star-text">me</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="initials">&#10084;&#65039;</div>
        <h1>Would You Rather</h1>
        <p>M &bull; A &bull; Forever</p>
    </div>

    <div id="gameArea">
        <div class="progress-dots" id="progressDots"></div>
        <div class="question-area" id="questionArea"></div>
    </div>

    <div id="resultsContainer" class="results hidden"></div>
</div>

<script>
    // Edit Abdessalam's answers here (A or B)
    const hisAnswers = { 0: "A", 1: "A", 2: "B", 3: "A" };

    const questions = [
        {
            intro: "On a cool spring evening,",
            introFr: "Par un doux soir de printemps,",
            a: "Cuddle under a warm blanket and watch a romantic movie",
            aFr: "Se blottir sous une couverture et regarder un film romantique",
            b: "Go for a moonlit walk hand in hand, just talking",
            bFr: "Se promener au clair de lune main dans la main en parlant"
        },
        {
            intro: "On a quiet Friday night,",
            introFr: "Un vendredi soir tranquille,",
            a: "Cook a fancy dinner together, dancing in the kitchen",
            aFr: "Préparer un dîner ensemble en dansant dans la cuisine",
            b: "Order from our favorite spot and talk all night on the balcony",
            bFr: "Commander chez notre favori et parler toute la nuit sur le balcon"
        },
        {
            intro: "On a weekend morning,",
            introFr: "Un matin de week-end,",
            a: "Wake up early to watch the sunrise from a rooftop",
            aFr: "Se réveiller tôt pour voir le lever du soleil sur un toit",
            b: "Sleep in and have a slow, lazy morning wrapped in each other",
            bFr: "Faire la grasse matinée blottis l'un contre l'autre"
        },
        {
            intro: "To show you my love every day,",
            introFr: "Pour te montrer mon amour chaque jour,",
            a: "Leave you little love notes hidden everywhere for you to find",
            aFr: "Te laisser des petits mots doux cachés partout pour que tu les trouves",
            b: "Surprise you with small thoughtful gifts just because",
            bFr: "Te surprendre avec des petits cadeaux attentionnés juste comme ça"
        }
    ];

    let current = 0;
    let herAnswers = {};
    let selected = null;

    function createStars() {
        const sky = document.getElementById('sky');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const sz = Math.random() * 3 + 1;
            s.style.width = sz + 'px'; s.style.height = sz + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
            s.style.animationDelay = Math.random() * 5 + 's';
            sky.appendChild(s);
        }
        for (let i = 0; i < 2; i++) {
            const ss = document.createElement('div');
            ss.className = 'shooting-star';
            ss.style.top = (Math.random() * 40 + 5) + '%';
            ss.style.left = (Math.random() * 40 + 50) + '%';
            ss.style.animationDelay = (i * 5 + Math.random() * 3) + 's';
            sky.appendChild(ss);
        }
    }
    createStars();

    function renderDots() {
        const dots = document.getElementById('progressDots');
        let html = '';
        questions.forEach((q, i) => {
            let cls = 'dot';
            if (i === current) cls += ' active';
            else if (herAnswers[i]) cls += ' done';
            html += `<div class="${cls}"></div>`;
        });
        dots.innerHTML = html;
    }

    function renderQuestion() {
        const area = document.getElementById('questionArea');
        const q = questions[current];
        selected = null;

        let html = `<div class="fade-in">`;
        html += `<div class="question-number">${current + 1} / ${questions.length}</div>`;
        html += `<div class="question-text">${q.intro}<br>Would you rather...</div>`;
        html += `<div style="font-size:0.75em;color:rgba(255,255,255,0.25);margin-bottom:20px;font-style:italic;">${q.introFr}<br>Tu préférerais...</div>`;
        html += `<div class="options">`;
        html += `<div class="option-btn" data-choice="A" onclick="pick('A')">${q.a}<br><span style="font-size:0.75em;color:rgba(255,255,255,0.25);">${q.aFr}</span></div>`;
        html += `<div class="vs">VS</div>`;
        html += `<div class="option-btn" data-choice="B" onclick="pick('B')">${q.b}<br><span style="font-size:0.75em;color:rgba(255,255,255,0.25);">${q.bFr}</span></div>`;
        html += `</div>`;
        html += `<div id="revealArea"></div>`;
        html += `<button class="btn-next" id="nextBtn" disabled onclick="next()">Next &#10048;</button>`;
        html += `</div>`;

        area.innerHTML = html;
        renderDots();
    }

    function pick(choice) {
        if (selected) return;
        selected = choice;
        herAnswers[current] = choice;

        document.querySelectorAll('.option-btn').forEach(b => {
            b.disabled = true;
            if (b.dataset.choice === choice) b.classList.add('selected');
        });

        const reveal = document.getElementById('revealArea');
        const his = hisAnswers[current];
        const match = choice === his;
        const q = questions[current];
        const hisText = his === 'A' ? q.a : q.b;

        let cls = match ? 'reveal-box match' : 'reveal-box mismatch';
        let msg = match
            ? `&#10004; Abdessalam agrees! He chose: "${hisText}"`
            : `&#10008; Abdessalam chose: "${hisText}"`;

        reveal.innerHTML = `<div class="${cls}">${msg}</div>`;
        document.getElementById('nextBtn').disabled = false;
    }

    function next() {
        current++;
        if (current < questions.length) renderQuestion();
        else showResults();
    }

    function showResults() {
        document.getElementById('gameArea').classList.add('hidden');
        const container = document.getElementById('resultsContainer');
        container.classList.remove('hidden');

        let matchCount = 0;
        questions.forEach((q, i) => {
            if (herAnswers[i] && herAnswers[i] === hisAnswers[i]) matchCount++;
        });

        const pct = Math.round((matchCount / questions.length) * 100);

        let html = `<h2>M &#10048; A</h2>`;
        html += `<p class="subtitle">We agreed on ${matchCount} of ${questions.length}</p>`;
        html += `<div class="score-circle"><div class="score-number">${pct}%</div><div class="score-label">Match</div></div>`;

        questions.forEach((q, i) => {
            const her = herAnswers[i];
            const his = hisAnswers[i];
            const match = her && her === his;
            const herText = her === 'A' ? q.a : q.b;
            const hisText = his === 'A' ? q.a : q.b;

            html += `<div class="result-item">`;
            html += `<div class="r-q">Would you rather...</div>`;
            html += `<div class="r-answers">`;
            html += `<span class="hers">M: ${herText}</span> &nbsp;|&nbsp; `;
            html += `<span class="his">A: ${hisText}</span>`;
            html += match ? ` &nbsp; &#10004;` : ` &nbsp; &#10008;`;
            html += `</div></div>`;
        });

        html += `<button class="btn-restart" onclick="location.reload()">&#8634; Again</button>`;
        container.innerHTML = html;
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    renderQuestion();
</script>
</body>
</html>
