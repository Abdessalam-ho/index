        }

            0% { opacity: 0.15; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        .moon-container {
            position: fixed; top: 4%; right: 6%; z-index: 1;
        }
        .moon {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #fffbe6 0%, #f5e6a3 40%, #d4b86a 100%);
            box-shadow: 0 0 50px rgba(245,230,163,0.25), 0 0 100px rgba(245,230,163,0.1), 0 0 200px rgba(245,230,163,0.05);
            position: relative;

        .moon-crater {
            position: absolute; border-radius: 50%;
            background: rgba(160,130,60,0.2);
        }
        .moon-crater:nth-child(1) { width: 20px; height: 20px; top: 22%; left: 18%; }
        .moon-crater:nth-child(2) { width: 12px; height: 12px; top: 58%; left: 52%; }
        .moon-crater:nth-child(3) { width: 16px; height: 16px; top: 12%; left: 62%; }
        .moon-crater:nth-child(4) { width: 8px; height: 8px; top: 72%; left: 22%; }
        .moon-crater:nth-child(5) { width: 10px; height: 10px; top: 42%; left: 72%; }
        .moon-glow {
            position: absolute; top: -35px; left: -35px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245,230,163,0.06) 0%, transparent 65%);
            animation: moonPulse 4s ease-in-out infinite alternate;
        }
        @keyframes moonPulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .orbit-container {
            position: absolute; top: -40px; left: -40px;
            width: 190px; height: 190px;
            animation: orbit 7s linear infinite;
            z-index: 10;
        }
        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .orbiting-star {
            position: absolute; top: -18px; left: 50%;
            transform: translateX(-50%);
            width: 46px; height: 46px;
            display: flex; align-items: center; justify-content: center;
        }
        .orbiting-star::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 40% 30%, #fff 0%, #fffbe6 40%, #f5e6a3 100%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);

            font-family: 'Playfair Display', serif;

            padding-bottom: 22px;

            border: 1.5px dashed rgba(248,187,208,0.25);
            background: transparent;
            color: rgba(248,187,208,0.3);
            font-size: 1.1em; cursor: pointer;
            margin: 0 auto 14px;
            transition: all 0.3s;
        }
        .add-btn:hover {
            border-color: rgba(248,187,208,0.5);
            color: rgba(248,187,208,0.7);
            background: rgba(248,187,208,0.05);

        .comment-wrap {
            overflow: hidden;
            max-height: 0;

        }
        .comment-box textarea {

            font-size: 0.9em; line-height: 1.7;

        .footer {

        /* Password overlay */
        .pwd-overlay {

            font-size: 1em;
            color: rgba(255,255,255,0.5);

        .pwd-input-wrap {

        .msg-content-wrap.unlocked { display: block; }

            .moon-container { transform: scale(0.6); top: 1%; right: 2%; }
            .header h1 { font-size: 1.5em; }
            .section { padding: 22px 18px 0; }
            .section .content { font-size: 0.93em; }
        }
    </style>
</head>

    function createStars() {
        const sky = document.getElementById('sky');
        for (let i = 0; i < 70; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const sz = Math.random() * 3 + 1;
            s.style.width = sz + 'px'; s.style.height = sz + 'px';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
            s.style.animationDelay = Math.random() * 5 + 's';
            sky.appendChild(s);
        }
    }
    createStars();

    // Password logic
    const correctPwd = '07010104';
    const pwdInputs = document.querySelectorAll('.pwd-input');
    const pwdError = document.getElementById('pwdError');
    const unlockBtn = document.getElementById('unlockBtn');
    const pwdOverlay = document.getElementById('pwdOverlay');
    const msgWrap = document.getElementById('msgWrap');

    pwdInputs.forEach((input, idx) => {
        input.addEventListener('input', function() {
            if (this.value.length > 0) {
                this.classList.add('filled');
                if (idx < pwdInputs.length - 1) pwdInputs[idx + 1].focus();
            }
        });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value === '' && idx > 0) {
                pwdInputs[idx - 1].focus();
                pwdInputs[idx - 1].classList.remove('filled');
            }
            if (e.key === 'Enter') { e.preventDefault(); unlock(); }
        });
    });

    function unlock() {
        let pwd = '';
        pwdInputs.forEach(i => pwd += i.value);
        pwdError.textContent = '';

        if (pwd.length !== 8) { pwdError.textContent = 'Please enter all 8 digits.'; return; }
        if (pwd !== correctPwd) { pwdError.textContent = '❌ Not quite. Try again with the correct dates 💕'; return; }

        unlockBtn.disabled = true;
        unlockBtn.textContent = 'Unlocking... 💌';

        fetch(formspreeUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                _subject: '🔐 She unlocked the heart message!',
                message: 'She entered the correct password and read your message 🤍'
            })
        }).catch(() => {});

        setTimeout(() => {
            pwdOverlay.style.display = 'none';
            msgWrap.classList.add('unlocked');
            msgWrap.style.display = 'block';
        }, 800);
    }

    let autoSaveTimers = {};

    function loadSaved() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
        catch { return {}; }
    }
    function saveToStorage(idx, text) {
        const all = loadSaved();
        if (text.trim()) all[idx] = text;
        else delete all[idx];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }
    function deleteFromStorage(idx) {
        const all = loadSaved();
        delete all[idx];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }

    const container = document.getElementById('sections');

    data.forEach((text, idx) => {
        const delay = idx * 0.15;
        const div = document.createElement('div');
        div.className = 'section';
        div.style.animationDelay = `${delay}s`;
        div.innerHTML = `
            <div class="content">${text}</div>
            <button class="add-btn" onclick="toggleComment(${idx})">+</button>
            <div class="comment-wrap" id="wrap-${idx}">
                <div class="comment-box">
                    <textarea id="ta-${idx}" placeholder="Your thoughts..." oninput="onInput(${idx})"></textarea>
                    <div class="comment-footer">
                        <span class="save-status" id="status-${idx}"></span>
                        <button class="delete-btn" onclick="deleteComment(${idx})">&#128465;</button>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(div);

        const saved = loadSaved();
        if (saved[idx]) {
            document.getElementById(`ta-${idx}`).value = saved[idx];
            openComment(idx);
        }
    });

    function toggleComment(idx) {
        const w = document.getElementById(`wrap-${idx}`);
        w.classList.toggle('open');
        if (w.classList.contains('open'))
            setTimeout(() => document.getElementById(`ta-${idx}`).focus(), 350);
    }
    function openComment(idx) {
        document.getElementById(`wrap-${idx}`).classList.add('open');
    }
    function onInput(idx) {
        const ta = document.getElementById(`ta-${idx}`);
        if (autoSaveTimers[idx]) clearTimeout(autoSaveTimers[idx]);
        autoSaveTimers[idx] = setTimeout(() => {
            saveToStorage(idx, ta.value);
        }, 800);
    }
    function deleteComment(idx) {
        const w = document.getElementById(`wrap-${idx}`);
        document.getElementById(`ta-${idx}`).value = '';
        deleteFromStorage(idx);
        w.classList.remove('open');
    }

    window.addEventListener('beforeunload', function() {
        const saved = loadSaved();
        const entries = Object.entries(saved).filter(([_, v]) => v.trim());
        if (!entries.length) return;
        const payload = {
            _subject: '💭 She left comments on your heart message',
            total_comments: entries.length,
            comments: entries.map(([idx, t]) => `Section ${parseInt(idx) + 1}:\n${t}`).join('\n\n---\n\n')
        };
        const nav = window.navigator;
        if (nav.sendBeacon) {
            nav.sendBeacon(formspreeUrl, new Blob([JSON.stringify(payload)], { type: 'application/json' }));
        } else {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', formspreeUrl, false);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify(payload));
        }
    });
</script>
