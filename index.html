<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for You 🤍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #0a0e27; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 30px 16px; overflow-x: hidden;
        }
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&family=Tajawal:wght@400;500&display=swap');

        #sky {
            position: fixed; inset: 0; z-index: 0;
            background: linear-gradient(180deg, rgba(10,14,39,0.7) 0%, rgba(26,16,64,0.7) 40%, rgba(45,27,105,0.7) 70%, rgba(26,16,64,0.7) 100%), url('bg.jpg') center/cover no-repeat;
        }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.15; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.3); } }

        .container {
            position: relative; z-index: 10; max-width: 680px; width: 100%;
            background: rgba(255,255,255,0.07); backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
            padding: 40px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .intro {
            text-align: center; padding: 30px 0;
        }
        .intro h1 {
            font-family: 'Playfair Display', serif; font-size: 2.2em;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f5e6a3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .intro p {
            color: rgba(255,255,255,0.3); font-size: 0.85em; font-style: italic;
        }

        .password-section {
            text-align: center; margin: 20px 0;
        }
        .password-section label {
            display: block; font-family: 'Playfair Display', serif;
            font-size: 1.1em; color: rgba(255,255,255,0.7); margin-bottom: 12px;
        }
        .password-section .hint {
            font-size: 0.8em; color: rgba(245,230,163,0.4); margin-bottom: 14px;
            font-style: italic;
        }
        .password-input-wrap {
            display: flex; gap: 10px; justify-content: center; align-items: center;
        }
        .password-input-wrap input {
            padding: 12px 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
            font-size: 1.1em; font-family: 'Inter', sans-serif; color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.06); outline: none; width: 200px; text-align: center;
            letter-spacing: 4px; transition: border-color 0.3s;
        }
        .password-input-wrap input:focus {
            border-color: rgba(233,30,99,0.4); box-shadow: 0 0 0 3px rgba(233,30,99,0.08);
        }
        .password-input-wrap button {
            padding: 12px 24px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #e91e63, #c2185b); color: #fff;
            font-family: 'Playfair Display', serif; font-size: 0.95em; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .password-input-wrap button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233,30,99,0.3); }
        .password-input-wrap button:disabled { opacity: 0.4; cursor: default; transform: none; }
        .password-error {
            color: #ef9a9a; font-size: 0.8em; margin-top: 8px; min-height: 20px;
        }
        .password-success {
            color: #a5d6a7; font-size: 0.8em; margin-top: 8px;
        }

        .hidden { display: none; }

        .message {
            animation: fadeIn 0.8s ease-out;
        }
        .message .title {
            text-align: center; font-family: 'Playfair Display', serif;
            font-size: 1.3em; color: #f8bbd0; margin-bottom: 16px;
        }
        .message .content {
            font-family: 'Tajawal', 'Inter', sans-serif;
            font-size: 0.95em; color: rgba(255,255,255,0.85); line-height: 1.8;
            white-space: pre-wrap;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            max-height: 500px;
            overflow-y: auto;
        }
        .message .content .fr {
            font-family: 'Inter', sans-serif;
            font-size: 0.78em; color: rgba(255,255,255,0.3);
            margin-top: 2px; margin-bottom: 8px;
            display: block;
        }
        .message .separator {
            text-align: center; color: rgba(233,30,99,0.3); margin: 8px 0;
            font-size: 0.9em;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            .intro h1 { font-size: 1.6em; }
            .password-input-wrap { flex-direction: column; }
            .password-input-wrap input { width: 100%; }
            .message .content { max-height: 400px; font-size: 0.88em; padding: 12px 14px; }
        }
    </style>
</head>
<body>
<div id="sky"></div>

    <div id="introSection" class="intro">
        <h1>This is a message for you 🤍</h1>

    <div id="passwordSection" class="password-section">

        <div class="password-input-wrap">
            <input type="password" id="passwordInput" placeholder="••••" maxlength="4" autocomplete="off">
            <button id="unlockBtn" onclick="checkPassword()">Open &#10084;</button>
        </div>
        <div id="passwordStatus" class="password-error"></div>
    </div>

    <div id="messageSection" class="message hidden">
        <div class="title">&#10084;&#65039; A message from your heart &#10084;&#65039;</div>
        <div class="content" id="messageContent"></div>
    </div>
</div>

    function checkPassword() {
        const input = document.getElementById('passwordInput');
        const status = document.getElementById('passwordStatus');
        const btn = document.getElementById('unlockBtn');
        const pwd = input.value.trim().toLowerCase();

        if (pwd !== correctPassword) {
            status.textContent = '❌ Wrong password. Try again.';
            status.className = 'password-error';
            return;
        }

        status.textContent = '✅ Correct! Opening your message...';
        status.className = 'password-success';
        btn.disabled = true;
        input.disabled = true;

        // Send notification to email
        fetch('https://formspree.io/f/xrewrldv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

                message: 'She entered the password and read your message 💌🤍'
            })
        }).catch(() => {});

        setTimeout(() => {
            document.getElementById('passwordSection').classList.add('hidden');
            document.getElementById('messageContent').innerHTML = msgContent;
            document.getElementById('messageSection').classList.remove('hidden');
            document.getElementById('messageSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 1000);
    }

    // Allow Enter key to submit
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {

</script>
</body>
</html>
