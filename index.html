<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open My Heart 🤍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #0a0e27; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }
        #sky {
            position: fixed; inset: 0; z-index: 0;
            background: linear-gradient(180deg, rgba(10,14,39,0.7) 0%, rgba(26,16,64,0.7) 40%, rgba(45,27,105,0.7) 70%, rgba(26,16,64,0.7) 100%), url('bg.jpg') center/cover no-repeat;
        }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.15; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.3); } }

        .container {
            position: relative; z-index: 10; text-align: center; width: 100%; max-width: 500px; padding: 20px;
        }

        .heart-stage {
            position: relative; width: 220px; height: 220px; margin: 0 auto 20px; cursor: pointer;
        }
        .heart {
            width: 100%; height: 100%; position: relative;
            animation: heartbeat 1.2s ease-in-out infinite;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            filter: drop-shadow(0 0 40px rgba(233,30,99,0.3));
        }
        .heart.open { animation: none; transform: scale(1.1); opacity: 0; pointer-events: none; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
        .heart svg { width: 100%; height: 100%; display: block; }
        .knock-text {
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            font-family: 'Playfair Display', serif; font-size: 0.9em;
            color: rgba(255,255,255,0.35); white-space: nowrap;
            transition: opacity 0.5s; line-height: 1.5;
        }
        .knock-text .fr { font-size: 0.8em; color: rgba(255,255,255,0.2); }

        .hidden { display: none; }

        .question-box {
            animation: fadeIn 0.6s ease-out;
        }
        .question-box h2 {
            font-family: 'Playfair Display', serif; font-size: 1.4em;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 6px; line-height: 1.4;
        }
        .question-box .q-fr {
            font-size: 0.8em; color: rgba(255,255,255,0.25); margin-bottom: 20px; font-style: italic;
        }
        .btn-group { display: flex; gap: 16px; justify-content: center; }
        .btn-choice {
            padding: 14px 40px; border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8);
            font-family: 'Playfair Display', serif; font-size: 1.1em; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-choice:hover { transform: translateY(-3px); }
        .btn-choice.yes:hover { background: rgba(129,199,132,0.15); border-color: #81c784; color: #a5d6a7; }
        .btn-choice.no:hover { background: rgba(239,83,80,0.15); border-color: #ef5350; color: #ef9a9a; }
        .btn-choice:disabled { opacity: 0.4; cursor: default; transform: none; }

        .result-box {
            animation: fadeIn 0.8s ease-out;
        }
        .result-box .big-heart {
            font-size: 4em; margin-bottom: 10px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        .result-box h3 {
            font-family: 'Playfair Display', serif; font-size: 1.6em;
            background: linear-gradient(135deg, #fce4ec, #f5e6a3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 6px; line-height: 1.4;
        }
        .result-box .r-fr {
            color: rgba(255,255,255,0.25); font-size: 0.8em; font-style: italic;
        }
        .result-box p {
            color: rgba(255,255,255,0.5); font-size: 1em; line-height: 1.6;
        }
        .status-msg {
            margin-top: 16px; font-size: 0.8em; color: rgba(255,255,255,0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .heart-stage { width: 160px; height: 160px; }
            .question-box h2 { font-size: 1.2em; }
            .btn-choice { padding: 12px 30px; font-size: 1em; }
            .result-box h3 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
<div id="sky"></div>
<div class="container" id="app">
    <div id="heartStage" class="heart-stage">
        <div class="heart" id="heart">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fce4ec"/>
                        <stop offset="50%" stop-color="#e91e63"/>
                        <stop offset="100%" stop-color="#c2185b"/>
                    </linearGradient>
                </defs>
                <path d="M50 88 C20 60 5 40 5 25 C5 10 20 2 35 10 C42 14 48 22 50 28 C52 22 58 14 65 10 C80 2 95 10 95 25 C95 40 80 60 50 88Z" fill="url(#heartGrad)"/>
            </svg>
        </div>
        <div class="knock-text" id="knockText">
            Knock twice to open my heart<br>
            <span class="fr">Frappe deux fois pour ouvrir mon cœur</span>
        </div>
    </div>

    <div id="questionArea" class="hidden question-box">
        <h2>Did you knock or you still need some time to think?</h2>
        <div class="q-fr">As-tu frappé ou as-tu encore besoin de temps pour réfléchir ?</div>
        <div class="btn-group">
            <button class="btn-choice yes" onclick="answer('yes')">Yes / Oui</button>
            <button class="btn-choice no" onclick="answer('no')">No / Non</button>
        </div>
    </div>

    <div id="resultArea" class="hidden result-box"></div>
    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    let heartOpened = false;
    let lastClickTime = 0;
    let knockCount = 0;
    let timer = 10;
    let countdownInterval;
    let answered = false;

    const heart = document.getElementById('heart');
    const heartStage = document.getElementById('heartStage');
    const knockText = document.getElementById('knockText');
    const questionArea = document.getElementById('questionArea');
    const resultArea = document.getElementById('resultArea');
    const statusMsg = document.getElementById('statusMsg');

    function createStars() {
        const sky = document.getElementById('sky');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const sz = Math.random() * 3 + 1;
            s.style.width = sz + 'px'; s.style.height = sz + 'px';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
            s.style.animationDelay = Math.random() * 5 + 's';
            sky.appendChild(s);
        }
    }
    createStars();

    // Countdown
    countdownInterval = setInterval(() => {
        timer--;
        if (timer <= 0) {
            clearInterval(countdownInterval);
            if (!heartOpened) openHeart();
        }
    }, 1000);

    // Double-click (knock twice)
    heartStage.addEventListener('click', function(e) {
        if (heartOpened) return;
        const now = Date.now();
        if (now - lastClickTime < 500) {
            knockCount++;
            if (knockCount >= 1) {
                clearInterval(countdownInterval);
                openHeart();
            }
        }
        lastClickTime = now;
    });

    function openHeart() {
        if (heartOpened) return;
        heartOpened = true;
        heart.classList.add('open');
        knockText.style.opacity = '0';
        setTimeout(() => {
            knockText.classList.add('hidden');
            heartStage.style.cursor = 'default';
            questionArea.classList.remove('hidden');
            questionArea.style.animation = 'fadeIn 0.6s ease-out';
        }, 800);
    }

    function answer(choice) {
        if (answered) return;
        answered = true;

        document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);

        const msgEn = choice === 'yes'
            ? 'You lost ❤️'
            : 'You won! ❤️';
        const msgFr = choice === 'yes'
            ? 'Tu as perdu ❤️'
            : 'Tu as gagné ! ❤️';
        const subEn = 'My heart is always open to you';
        const subFr = 'Mon cœur est toujours ouvert pour toi';
        const darja = choice === 'yes'
            ? 'Mcha2allah mou7tarma bzef tabtab 9bel ma tdkhel l 9albha 🤭🤭🤣🤣'
            : 'hagda ta3ajbini t3arfi plastek 🤭🤭🥰🤍';

        setTimeout(() => {
            questionArea.classList.add('hidden');
            resultArea.innerHTML = `
                <div class="result-box">
                    <div class="big-heart">❤️</div>
                    <h3>${msgEn}<br><span style="font-size:0.55em;background:none;-webkit-text-fill-color:rgba(255,255,255,0.5);">${subEn}</span></h3>
                    <div class="r-fr">${msgFr}<br>${subFr}</div>
                    <div style="margin-top:14px;font-family:'Playfair Display',serif;font-size:1.1em;color:rgba(245,230,163,0.8);line-height:1.5;">${darja}</div>
                    <p style="margin-top:12px;">No matter what, my heart is always yours 🤍<br><span style="font-size:0.8em;color:rgba(255,255,255,0.25);">Peu importe, mon cœur est toujours à toi 🤍</span></p>
                </div>
            `;
            resultArea.classList.remove('hidden');
        }, 500);

        const data = {
            _subject: 'Open My Heart - Her Answer 🤍',
            answer: choice === 'yes' ? 'Yes - she knocked' : 'No - she waited',
            message: `She answered: ${choice === 'yes' ? 'Yes (she knocked)' : 'No (she waited / needed time)'}
Both ways win - my heart is always open for her.`
        };

        statusMsg.textContent = 'Sending your answer...';

        fetch('https://formspree.io/f/xrewrldv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(() => { statusMsg.textContent = ''; })
        .catch(() => { statusMsg.textContent = ''; });
    }
</script>
</body>
</html>
